<div class="shell" [class.nav-closed]="!sidenavOpened()">

  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <aside class="sidebar">

    <!-- En-tête : marque + bouton collapse -->
    <div class="sidebar-head">
      <div class="brand">
        <div class="brand-icon">
          <mat-icon>emoji_events</mat-icon>
        </div>
        <div class="brand-text">
          <span class="brand-name">Dufief</span>
          <span class="brand-sub">Tournament Manager</span>
        </div>
      </div>
      <button class="collapse-btn"
              (click)="toggleSidenav()"
                           matTooltip="Réduire"
              matTooltipPosition="right">
        <mat-icon>keyboard_double_arrow_left</mat-icon>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <span class="nav-section">Menu</span>
      <a class="nav-item"
         routerLink="/dashboard"
         routerLinkActive="nav-item--active"
         matRipple>
        <mat-icon class="nav-icon">dashboard</mat-icon>
        <span class="nav-label">Dashboard</span>
      </a>
    </nav>

    <!-- Pied : toggle thème -->
    <div class="sidebar-foot">
      <button class="theme-btn" (click)="theme.toggle()" matRipple>
        <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        <span>{{ theme.isDark() ? 'Thème clair' : 'Thème sombre' }}</span>
      </button>
    </div>

  </aside>

  <!-- Onglet réouverture (visible seulement sidebar fermée) -->
  <button class="reopen-tab"
          (click)="toggleSidenav()"
          matTooltip="Ouvrir le menu"
          matTooltipPosition="right">
    <mat-icon>keyboard_double_arrow_right</mat-icon>
  </button>

  <!-- ── Contenu ──────────────────────────────────────────────── -->
  <main class="shell-content">
    <router-outlet />
  </main>

</div>

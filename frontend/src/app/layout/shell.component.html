<mat-sidenav-container class="shell-container">

  <!-- ── Sidenav ──────────────────────────────────────────────── -->
  <mat-sidenav
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="isHandset() ? false : sidenavOpened()"
    class="shell-sidenav">

    <!-- Marque -->
    <div class="brand">
      <div class="brand-icon">
        <mat-icon>emoji_events</mat-icon>
      </div>
      <div class="brand-text">
        <span class="brand-name">Dufief</span>
        <span class="brand-tagline">Tournament Manager</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidenav-nav">
      <p class="nav-section-label">Menu</p>
      <mat-nav-list>
        <a mat-list-item
           routerLink="/dashboard"
           routerLinkActive="active-link"
           #rla="routerLinkActive">
          <mat-icon matListItemIcon [class.active-icon]="rla.isActive">dashboard</mat-icon>
          <span matListItemTitle>Dashboard</span>
        </a>
      </mat-nav-list>
    </nav>

    <!-- Bas de sidenav -->
    <div class="sidenav-footer">
      <button mat-icon-button
              (click)="theme.toggle()"
              [matTooltip]="theme.isDark() ? 'Thème clair' : 'Thème sombre'"
              class="theme-btn">
        <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </div>

  </mat-sidenav>

  <!-- ── Contenu ──────────────────────────────────────────────── -->
  <mat-sidenav-content class="shell-content">

    <!-- Bulle unique — toujours dans le contenu, icône inversée selon état -->
    <button class="toggle-bubble"
            (click)="toggleSidenav()"
            [attr.aria-label]="sidenavOpened() ? 'Fermer le menu' : 'Ouvrir le menu'">
      <mat-icon>{{ sidenavOpened() ? 'chevron_left' : 'chevron_right' }}</mat-icon>
    </button>

    <main class="shell-main">
      <router-outlet />
    </main>

  </mat-sidenav-content>

</mat-sidenav-container>

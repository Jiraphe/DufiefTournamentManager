<mat-sidenav-container class="shell-container">

  <mat-sidenav
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="isHandset() ? false : sidenavOpened()"
    class="shell-sidenav">

    <div class="sidenav-header">
      <mat-icon class="app-icon">emoji_events</mat-icon>
      <span class="app-title">Dufief</span>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content class="shell-content">

    <mat-toolbar color="primary" class="shell-toolbar">
      <button mat-icon-button (click)="toggleSidenav()" aria-label="Menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">Tournament Manager</span>
    </mat-toolbar>

    <main class="shell-main">
      <router-outlet />
    </main>

  </mat-sidenav-content>

</mat-sidenav-container>
